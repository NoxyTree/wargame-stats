<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="favicon.png">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wargame Stats · Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-void:        #07090d;
    --bg-deep:        #0d1117;
    --bg-panel:       #141922;
    --bg-panel-hi:    #1b2130;
    --border:         #2a3244;
    --border-hi:      #3a465e;
    --text-primary:   #e8ecf4;
    --text-secondary: #98a2b8;
    --text-muted:     #5e6a84;
    --accent:         #f5a524;
    --accent-hi:      #ffc658;
    --accent-glow:    rgba(245, 165, 36, 0.35);
    --accent-dim:     rgba(245, 165, 36, 0.1);
    --discord:        #5865f2;
    --grid-line:      rgba(245, 165, 36, 0.05);
    --radius-sm:      8px;
    --radius-md:      14px;
    --radius-lg:      22px;
    --font-display:   'Cinzel', 'Times New Roman', serif;
    --font-body:      'Inter', system-ui, sans-serif;
    --font-mono:      'JetBrains Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    background: var(--bg-void);
  }

  body {
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* ── Background grid ── */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      linear-gradient(var(--grid-line) 1px, transparent 1px) 0 0 / 64px 64px,
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px) 0 0 / 64px 64px;
    mask-image: radial-gradient(ellipse at center, #000 30%, transparent 85%);
    pointer-events: none;
  }

  /* ── Card ── */
  .card {
    width: 100%;
    max-width: 420px;
    padding: 48px 40px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    text-align: center;
    animation: fadeUp 0.5s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: none; }
  }

  /* ── Logo ── */
  .sigil {
    width: 56px; height: 56px;
    display: grid; place-items: center;
    background: linear-gradient(135deg, #1b2130, #0d1117);
    border: 1px solid var(--accent);
    border-radius: var(--radius-sm);
    box-shadow: 0 0 24px var(--accent-glow), inset 0 0 14px rgba(245,165,36,0.12);
    margin: 0 auto 20px;
  }
  .sigil svg { width: 26px; height: 26px; stroke: var(--accent); fill: none; stroke-width: 1.5; }

  .wordmark {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 1.15rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .wordmark .accent { color: var(--accent); }

  .tagline {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  /* ── Invite banner ── */
  .invite-banner {
    display: none;
    align-items: center;
    gap: 10px;
    background: var(--accent-dim);
    border: 1px solid rgba(245,165,36,0.3);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    margin-bottom: 24px;
    text-align: left;
    font-size: 0.85rem;
    color: var(--text-secondary);
  }
  .invite-banner.visible { display: flex; }
  .invite-banner svg { flex-shrink: 0; stroke: var(--accent); fill: none; stroke-width: 1.6; }
  .invite-banner strong { color: var(--accent); }

  /* ── Divider ── */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0 0 28px;
  }

  /* ── Button ── */
  .btn-discord {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 15px 24px;
    background: var(--discord);
    color: #fff;
    font-family: var(--font-display);
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(88,101,242,0.3);
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
  }
  .btn-discord:hover {
    background: #4752c4;
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(88,101,242,0.45);
  }
  .btn-discord:active { transform: none; }
  .btn-discord svg { flex-shrink: 0; }

  /* ── Footer note ── */
  .note {
    margin-top: 24px;
    font-size: 0.75rem;
    color: var(--text-muted);
    line-height: 1.6;
  }

  /* ── Error state ── */
  .error-banner {
    display: none;
    align-items: center;
    gap: 10px;
    background: rgba(239,68,100,0.1);
    border: 1px solid rgba(239,68,100,0.3);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 0.83rem;
    color: #ef4464;
  }
  .error-banner.visible { display: flex; }

  /* ── Loading state ── */
  .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="page">
<div class="card">

  <div class="sigil">
    <svg viewBox="0 0 24 24">
      <path d="M12 2 L20 6 V13 C20 17 16 21 12 22 C8 21 4 17 4 13 V6 Z" />
      <path d="M8 12 L11 15 L16 9" stroke-linecap="round" />
    </svg>
  </div>

  <div class="wordmark">Wargame<span class="accent">Stats</span></div>
  <div class="tagline">Match Tracking · Player Intelligence</div>

  <div class="error-banner" id="errorBanner">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="errorMsg">Something went wrong. Please try again.</span>
  </div>

  <div class="invite-banner" id="inviteBanner">
    <svg width="16" height="16" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    <span>You've been invited to join <strong id="inviteGuildName">a guild</strong>. Sign in to continue.</span>
  </div>

  <hr class="divider">

  <a href="#" class="btn-discord" id="loginBtn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
    </svg>
    <span id="btnText">Sign in with Discord</span>
    <div class="spinner" id="btnSpinner"></div>
  </a>

  <p class="note" id="footerNote">Access is by invitation only. Contact your guild officer for an invite link.</p>

</div>
</div>

<script>
const API_BASE = "https://api.lunarchstats.com";

const params       = new URLSearchParams(location.search);
const inviteCode   = params.get("invite");
const errorCode    = params.get("error");

// Show error if redirected back with an error
if (errorCode) {
  const msgs = {
    no_code:     "Discord authorisation was cancelled.",
    auth_failed: "Sign in failed. Please try again.",
  };
  const banner = document.getElementById("errorBanner");
  document.getElementById("errorMsg").textContent = msgs[errorCode] || "Something went wrong.";
  banner.classList.add("visible");
}

// Check if already logged in
async function checkSession() {
  try {
    const res = await fetch(`${API_BASE}/auth/me`, { credentials: "include" });
    if (!res.ok) return;
    const user = await res.json();
    const active = user.memberships?.find(m => m.status === "active");
    const pending = user.memberships?.find(m => m.status === "pending");
    if (active)  return location.replace(`guild.html?guildId=${active.guild_id}`);
    if (pending) return location.replace("pending.html");
    if (user.is_developer) return location.replace("guild.html");
  } catch {}
}

// If invite code present, fetch guild name to show in banner
async function loadInvite(code) {
  try {
    const res = await fetch(`${API_BASE}/invite/${code}`);
    if (!res.ok) {
      document.getElementById("errorMsg").textContent = "This invite link is invalid or has expired.";
      document.getElementById("errorBanner").classList.add("visible");
      return;
    }
    const data = await res.json();
    document.getElementById("inviteGuildName").textContent = data.guild_name || "a guild";
    document.getElementById("inviteBanner").classList.add("visible");
  } catch {}
}

// Wire up login button
document.getElementById("loginBtn").addEventListener("click", (e) => {
  e.preventDefault();
  document.getElementById("btnText").textContent = "Connecting…";
  document.getElementById("btnSpinner").style.display = "block";
  const url = inviteCode
    ? `${API_BASE}/auth/discord?invite=${encodeURIComponent(inviteCode)}`
    : `${API_BASE}/auth/discord`;
  location.href = url;
});

// Run on load
checkSession();
if (inviteCode) loadInvite(inviteCode);
</script>
</body>
</html>
